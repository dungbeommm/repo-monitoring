name: Notify

on:
  workflow_dispatch:
    inputs:
      status:
        required: true
        type: string
      workflow:
        required: true
        type: string
      run_url:
        required: false
        type: string
      message:
        required: false
        type: string
  workflow_call:
    inputs:
      status:
        required: true
        type: string
      workflow:
        required: true
        type: string
      run_url:
        required: false
        type: string
      message:
        required: false
        type: string

jobs:
  notify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python src/notify.py --status "${{ inputs.status }}" --workflow "${{ inputs.workflow }}" --run-url "${{ inputs.run_url }}" --message "${{ inputs.message }}"
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

